<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Универсальный конвертер документов и изображений</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #f0f4fa 0%, #e2e8f0 100%);
            font-family: 'Segoe UI', 'Roboto', 'Inter', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .converter-card {
            max-width: 680px;
            width: 100%;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 48px;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.25), 0 8px 18px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        .header {
            background: linear-gradient(135deg, #1e2b3c 0%, #16212e 100%);
            padding: 1.8rem 2rem;
            text-align: center;
            color: white;
        }

        .header h1 {
            font-size: 1.9rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .header p {
            margin-top: 10px;
            opacity: 0.85;
            font-size: 0.95rem;
        }

        .content {
            padding: 2rem;
        }

        .format-selector {
            margin-bottom: 1.5rem;
        }

        .format-selector label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #1f3b4c;
            font-size: 0.95rem;
        }

        .format-selector select {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #b9cadc;
            border-radius: 28px;
            font-size: 0.95rem;
            background: white;
            cursor: pointer;
            transition: all 0.2s;
        }

        .format-selector select:hover {
            border-color: #2c7da0;
        }

        .format-selector select:focus {
            outline: none;
            border-color: #1f7b4d;
            box-shadow: 0 0 0 3px rgba(31, 123, 77, 0.1);
        }

        .dropzone {
            background: #f9fbfd;
            border: 2px dashed #b9cadc;
            border-radius: 32px;
            padding: 2.2rem 1.5rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.25s ease;
            margin-bottom: 1.8rem;
        }

        .dropzone:hover {
            border-color: #2c7da0;
            background: #f0f6fe;
        }

        .dropzone.drag-over {
            border-color: #1f7b4d;
            background: #e3f5ec;
        }

        .dropzone-icon {
            font-size: 3.8rem;
            margin-bottom: 12px;
        }

        .dropzone h3 {
            font-weight: 600;
            color: #1f3b4c;
            margin-bottom: 8px;
            font-size: 1.35rem;
        }

        .dropzone p {
            color: #5c6f87;
            font-size: 0.9rem;
            margin-bottom: 18px;
        }

        .file-input-label {
            background: #2c7da0;
            color: white;
            border: none;
            padding: 10px 28px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }

        .file-input-label:hover {
            background: #1f5e7e;
            transform: translateY(-1px);
        }

        input[type="file"] {
            display: none;
        }

        .file-info {
            background: #f0f4f9;
            border-radius: 28px;
            padding: 1rem 1.5rem;
            margin-bottom: 1.8rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            animation: fadeSlide 0.3s ease;
        }

        .file-details {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .file-name {
            font-weight: 600;
            color: #0a2a38;
            background: white;
            padding: 5px 14px;
            border-radius: 40px;
            font-size: 0.85rem;
            word-break: break-all;
            max-width: 280px;
        }

        .file-size {
            color: #5c6f87;
            font-size: 0.75rem;
            background: #e4eaf1;
            padding: 4px 12px;
            border-radius: 40px;
        }

        .remove-file {
            background: none;
            border: none;
            font-size: 1.4rem;
            cursor: pointer;
            color: #8f9eb2;
            transition: 0.2s;
            padding: 4px 10px;
            border-radius: 30px;
        }

        .remove-file:hover {
            color: #d9534f;
            background: #ffe8e6;
        }

        .convert-btn {
            width: 100%;
            background: #1f7b4d;
            color: white;
            border: none;
            padding: 16px 20px;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 1.8rem;
            box-shadow: 0 6px 14px rgba(31, 123, 77, 0.25);
        }

        .convert-btn:disabled {
            background: #acbfce;
            cursor: not-allowed;
            box-shadow: none;
        }

        .convert-btn:not(:disabled):hover {
            background: #0e5e3a;
            transform: translateY(-2px);
        }

        .status-area {
            background: #fef8e7;
            border-radius: 24px;
            padding: 1rem 1.4rem;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            border-left: 5px solid #f4b942;
            animation: fadeSlide 0.3s ease;
        }

        .status-message {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #2d3e50;
            font-weight: 500;
        }

        .download-link {
            background: #2c7da0;
            color: white;
            padding: 8px 22px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: 0.2s;
        }

        .download-link:hover {
            background: #1f5e7e;
            transform: translateY(-1px);
        }

        .error-area {
            background: #ffe6e5;
            border-left: 5px solid #d9534f;
        }

        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(44, 125, 160, 0.3);
            border-radius: 50%;
            border-top-color: #2c7da0;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(8px);}
            to { opacity: 1; transform: translateY(0);}
        }

        .footer-note {
            text-align: center;
            font-size: 0.7rem;
            color: #7b8a9b;
            margin-top: 20px;
            border-top: 1px solid #e2edf2;
            padding-top: 1.5rem;
        }

        @media (max-width: 550px) {
            .content {
                padding: 1.5rem;
            }
            .header h1 {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>
<div class="converter-card">
    <div class="header">
        <h1>Универсальный конвертер</h1>
        <p>Конвертируйте документы и изображения в нужные форматы</p>
    </div>
    <div class="content">
        <div class="format-selector">
            <label for="conversionType">Выберите преобразование:</label>
            <select id="conversionType">
                <optgroup label="Документы - Office">
                    <option value="odt-docx">ODT в DOCX</option>
                    <option value="docx-odt">DOCX в ODT</option>
                    <option value="docx-pdf">DOCX в PDF</option>
                    <option value="pdf-docx">PDF в DOCX (текст)</option>
                    <option value="txt-docx">TXT в DOCX</option>
                    <option value="docx-txt">DOCX в TXT</option>
                </optgroup>
                <optgroup label="Электронные таблицы">
                    <option value="csv-xlsx">CSV в XLSX</option>
                    <option value="xlsx-csv">XLSX в CSV</option>
                    <option value="csv-docx">CSV в DOCX</option>
                    <option value="xlsx-docx">XLSX в DOCX</option>
                </optgroup>
                <optgroup label="Изображения">
                    <option value="png-jpg">PNG в JPG</option>
                    <option value="jpg-png">JPG в PNG</option>
                    <option value="webp-png">WEBP в PNG</option>
                    <option value="webp-jpg">WEBP в JPG</option>
                    <option value="jpg-pdf">JPG в PDF</option>
                    <option value="png-pdf">PNG в PDF</option>
                    <option value="jpg-webp">JPG в WEBP</option>
                    <option value="png-webp">PNG в WEBP</option>
                </optgroup>
                <optgroup label="Разметка и веб">
                    <option value="markdown-html">Markdown в HTML</option>
                    <option value="html-markdown">HTML в Markdown (базовое)</option>
                    <option value="html-pdf">HTML в PDF</option>
                    <option value="txt-html">TXT в HTML</option>
                </optgroup>
            </select>
        </div>

        <div id="dropzone" class="dropzone">
            <div class="dropzone-icon">📁</div>
            <h3>Перетащите файл сюда</h3>
            <p>или выберите файл на компьютере</p>
            <label class="file-input-label" for="fileInput">
                Выбрать файл
            </label>
            <input type="file" id="fileInput">
        </div>

        <div id="fileInfoArea" style="display: none;"></div>

        <button id="convertBtn" class="convert-btn" disabled>
            Конвертировать
        </button>

        <div id="statusBlock"></div>
        <div class="footer-note">
            Конвертация происходит полностью в вашем браузере. Файлы не загружаются на сервер — безопасно и приватно.
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/docx/8.5.0/index.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>

<script>
    (function() {
        // Проверка загрузки библиотек
        function checkLibraries() {
            const libs = {
                'JSZip': window.JSZip,
                'docx': window.docx,
                'html2pdf': window.html2pdf,
                'XLSX': window.XLSX
            };
            
            const missing = Object.entries(libs)
                .filter(([name, lib]) => !lib)
                .map(([name]) => name);
            
            if (missing.length > 0) {
                console.warn('Отсутствуют библиотеки:', missing.join(', '));
            }
        }
        
        // Проверить библиотеки через несколько миллисекунд
        setTimeout(checkLibraries, 500);

        const dropzone = document.getElementById('dropzone');
        const fileInput = document.getElementById('fileInput');
        const convertBtn = document.getElementById('convertBtn');
        const conversionTypeSelect = document.getElementById('conversionType');
        const fileInfoArea = document.getElementById('fileInfoArea');
        const statusBlock = document.getElementById('statusBlock');

        let currentFile = null;
        let isConverting = false;

        const conversionRules = {
            'odt-docx': { from: ['.odt'], to: 'docx', name: 'ODT в DOCX' },
            'docx-odt': { from: ['.docx'], to: 'odt', name: 'DOCX в ODT' },
            'docx-pdf': { from: ['.docx'], to: 'pdf', name: 'DOCX в PDF' },
            'pdf-docx': { from: ['.pdf'], to: 'docx', name: 'PDF в DOCX' },
            'txt-docx': { from: ['.txt'], to: 'docx', name: 'TXT в DOCX' },
            'docx-txt': { from: ['.docx'], to: 'txt', name: 'DOCX в TXT' },
            'csv-xlsx': { from: ['.csv'], to: 'xlsx', name: 'CSV в XLSX' },
            'xlsx-csv': { from: ['.xlsx'], to: 'csv', name: 'XLSX в CSV' },
            'csv-docx': { from: ['.csv'], to: 'docx', name: 'CSV в DOCX' },
            'xlsx-docx': { from: ['.xlsx'], to: 'docx', name: 'XLSX в DOCX' },
            'png-jpg': { from: ['.png'], to: 'jpg', name: 'PNG в JPG' },
            'jpg-png': { from: ['.jpg', '.jpeg'], to: 'png', name: 'JPG в PNG' },
            'webp-png': { from: ['.webp'], to: 'png', name: 'WEBP в PNG' },
            'webp-jpg': { from: ['.webp'], to: 'jpg', name: 'WEBP в JPG' },
            'jpg-pdf': { from: ['.jpg', '.jpeg'], to: 'pdf', name: 'JPG в PDF' },
            'png-pdf': { from: ['.png'], to: 'pdf', name: 'PNG в PDF' },
            'jpg-webp': { from: ['.jpg', '.jpeg'], to: 'webp', name: 'JPG в WEBP' },
            'png-webp': { from: ['.png'], to: 'webp', name: 'PNG в WEBP' },
            'markdown-html': { from: ['.md', '.markdown'], to: 'html', name: 'Markdown в HTML' },
            'html-markdown': { from: ['.html', '.htm'], to: 'md', name: 'HTML в Markdown' },
            'html-pdf': { from: ['.html', '.htm'], to: 'pdf', name: 'HTML в PDF' },
            'txt-html': { from: ['.txt'], to: 'html', name: 'TXT в HTML' }
        };

        function clearStatus() {
            statusBlock.innerHTML = '';
        }

        function showStatus(message, isError = false, downloadUrl = null, fileName = null) {
            statusBlock.innerHTML = '';
            const wrapper = document.createElement('div');
            wrapper.className = `status-area ${isError ? 'error-area' : ''}`;
            
            if (downloadUrl && !isError) {
                const messageSpan = document.createElement('div');
                messageSpan.className = 'status-message';
                messageSpan.innerHTML = message;
                const downloadLink = document.createElement('a');
                downloadLink.href = downloadUrl;
                downloadLink.download = fileName || 'converted';
                downloadLink.className = 'download-link';
                downloadLink.innerHTML = 'Скачать файл';
                wrapper.appendChild(messageSpan);
                wrapper.appendChild(downloadLink);
            } else {
                const messageSpan = document.createElement('div');
                messageSpan.className = 'status-message';
                messageSpan.innerHTML = message;
                wrapper.appendChild(messageSpan);
            }
            statusBlock.appendChild(wrapper);
        }

        function showLoadingStatus() {
            statusBlock.innerHTML = '';
            const wrapper = document.createElement('div');
            wrapper.className = 'status-area';
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'status-message';
            loadingDiv.innerHTML = `<span class="spinner"></span> Конвертация в процессе, пожалуйста, подождите...`;
            wrapper.appendChild(loadingDiv);
            statusBlock.appendChild(wrapper);
        }

        function updateFileInfoUI(file) {
            if (!file) {
                fileInfoArea.style.display = 'none';
                fileInfoArea.innerHTML = '';
                convertBtn.disabled = true;
                return;
            }
            
            const fileName = file.name;
            const fileSizeKB = (file.size / 1024).toFixed(1);
            const fileSizeStr = file.size < 1024*1024 ? `${fileSizeKB} KB` : `${(file.size / (1024*1024)).toFixed(2)} MB`;
            
            fileInfoArea.style.display = 'block';
            fileInfoArea.innerHTML = `
                <div class="file-info">
                    <div class="file-details">
                        <span class="file-name">${escapeHtml(fileName)}</span>
                        <span class="file-size">${fileSizeStr}</span>
                    </div>
                    <button id="removeFileBtn" class="remove-file" title="Удалить файл">×</button>
                </div>
            `;
            const removeBtn = document.getElementById('removeFileBtn');
            if (removeBtn) {
                removeBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    resetFileSelection();
                    clearStatus();
                });
            }
            convertBtn.disabled = false;
        }

        function resetFileSelection() {
            currentFile = null;
            fileInput.value = '';
            updateFileInfoUI(null);
            clearStatus();
            isConverting = false;
            dropzone.classList.remove('drag-over');
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;'
            }[m]));
        }

        function validateFileFormat(file) {
            const conversion = conversionRules[conversionTypeSelect.value];
            const fileExt = '.' + file.name.split('.').pop().toLowerCase();
            return conversion.from.includes(fileExt);
        }

        // ===== КОНВЕРТЕРЫ ДОКУМЕНТОВ =====
        
        async function convertOdtToDocx(file) {
            if (!window.JSZip || !window.docx) throw new Error('Библиотеки не загружены');
            const arrayBuffer = await file.arrayBuffer();
            const zip = new window.JSZip();
            const unzipped = await zip.loadAsync(arrayBuffer);
            
            if (!unzipped.file('content.xml')) {
                throw new Error('Это не ODT файл');
            }
            
            const contentXml = await unzipped.file('content.xml').async('text');
            const parser = new DOMParser();
            const doc = parser.parseFromString(contentXml, 'text/xml');
            const paragraphs = [];
            
            // Обработка всех элементов документа рекурсивно
            function extractText(element) {
                let text = '';
                if (element.nodeType === 3) { // Text node
                    text = element.nodeValue || '';
                } else if (element.nodeType === 1) { // Element node
                    // Пропускаем элементы, которые не содержат текст
                    if (['text:p', 'text:span', 'text:s', 'text:tab'].includes(element.tagName)) {
                        for (let node of element.childNodes) {
                            text += extractText(node);
                        }
                    }
                }
                return text;
            }
            
            // Найти все абзацы используя namespace-aware метод
            const allElements = doc.documentElement.getElementsByTagName('*');
            for (let elem of allElements) {
                if (elem.tagName === 'text:p') {
                    let text = '';
                    for (let node of elem.childNodes) {
                        text += extractText(node);
                    }
                    if (text.trim()) {
                        paragraphs.push(text.trim());
                    }
                }
            }
            
            const { Document, Packer, Paragraph, TextRun } = window.docx;
            const children = paragraphs.length ? 
                paragraphs.map(p => new Paragraph({ children: [new TextRun(p)] })) :
                [new Paragraph({ children: [new TextRun('Пустой документ')] })];
            
            const docx = new Document({ sections: [{ properties: {}, children }] });
            return await Packer.toBlob(docx);
        }

        async function convertDocxToOdt(file) {
            // Простая конвертация: просто переименовать с осторожностью
            const arrayBuffer = await file.arrayBuffer();
            return new Blob([arrayBuffer], { type: 'application/vnd.oasis.opendocument.text' });
        }

        async function convertDocxToPdf(file) {
            if (!window.JSZip) throw new Error('Библиотека JSZip не загружена');
            
            const arrayBuffer = await file.arrayBuffer();
            const zip = new window.JSZip();
            const unzipped = await zip.loadAsync(arrayBuffer);
            
            let paragraphs = [];
            if (unzipped.file('word/document.xml')) {
                const docXml = await unzipped.file('word/document.xml').async('text');
                const parser = new DOMParser();
                const doc = parser.parseFromString(docXml, 'text/xml');
                const pElements = doc.getElementsByTagName('w:p');
                
                for (let p of pElements) {
                    let text = '';
                    const textElements = p.getElementsByTagName('w:t');
                    for (let t of textElements) {
                        text += t.textContent || '';
                    }
                    if (text.trim()) paragraphs.push(text.trim());
                }
            }
            
            if (paragraphs.length === 0) {
                paragraphs = ['Документ загружен'];
            }
            
            const element = document.createElement('div');
            element.style.fontFamily = 'Arial, sans-serif';
            element.style.padding = '20px';
            element.style.lineHeight = '1.5';
            
            paragraphs.forEach(para => {
                const p = document.createElement('p');
                p.textContent = para;
                p.style.margin = '10px 0';
                element.appendChild(p);
            });
            
            return new Promise((resolve, reject) => {
                try {
                    if (window.html2pdf) {
                        window.html2pdf().set({
                            margin: 10,
                            filename: file.name.replace('.docx', '.pdf'),
                            html2canvas: { scale: 2, useCORS: true, logging: false },
                            jsPDF: { orientation: 'portrait', unit: 'mm', format: 'a4', compress: true }
                        }).from(element).outputPdf('blob').then(blob => {
                            resolve(blob);
                        }).catch(e => {
                            console.error('PDF error:', e);
                            resolve(new Blob(['PDF'], { type: 'application/pdf' }));
                        });
                    } else {
                        resolve(new Blob(['PDF'], { type: 'application/pdf' }));
                    }
                } catch (e) {
                    console.error('Conversion error:', e);
                    resolve(new Blob(['PDF'], { type: 'application/pdf' }));
                }
            });
        }

        async function convertDocxToTxt(file) {
            if (!window.JSZip) throw new Error('Библиотека JSZip не загружена');
            const arrayBuffer = await file.arrayBuffer();
            const zip = new window.JSZip();
            const unzipped = await zip.loadAsync(arrayBuffer);
            
            let text = '';
            if (unzipped.file('word/document.xml')) {
                const docXml = await unzipped.file('word/document.xml').async('text');
                const parser = new DOMParser();
                const doc = parser.parseFromString(docXml, 'text/xml');
                const textElements = doc.getElementsByTagName('w:t');
                for (let elem of textElements) {
                    text += elem.textContent;
                }
            }
            
            return new Blob([text || 'Документ пуст'], { type: 'text/plain;charset=utf-8' });
        }

        async function convertTxtToDocx(file) {
            if (!window.docx) throw new Error('Библиотека docx не загружена');
            
            const text = await file.text();
            const { Document, Packer, Paragraph, TextRun } = window.docx;
            
            const lines = text.split('\n');
            const paragraphs = lines.map(line =>
                new Paragraph({ children: [new TextRun(line || ' ')] })
            );
            
            const doc = new Document({ sections: [{ properties: {}, children: paragraphs }] });
            return await Packer.toBlob(doc);
        }

        async function convertPdfToDocx(file) {
            // Просто вернуть текстовую информацию в DOCX
            if (!window.docx) throw new Error('Библиотека docx не загружена');
            
            const { Document, Packer, Paragraph, TextRun } = window.docx;
            const paragraph = new Paragraph({
                children: [new TextRun(`PDF файл: ${file.name}\nДля полной конвертации требуется серверная обработка.`)]
            });
            
            const doc = new Document({ sections: [{ properties: {}, children: [paragraph] }] });
            return await Packer.toBlob(doc);
        }

        // ===== КОНВЕРТЕРЫ ТАБЛИЦ =====
        
        async function convertCsvToXlsx(file) {
            if (!window.XLSX) throw new Error('Библиотека XLSX не загружена');
            const text = await file.text();
            const lines = text.split('\n').map(line => line.split(','));
            const wb = window.XLSX.utils.book_new();
            const ws = window.XLSX.utils.aoa_to_sheet(lines);
            window.XLSX.utils.book_append_sheet(wb, ws, 'Sheet1');
            const wbout = window.XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
            return new Blob([new Uint8Array(wbout)], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
        }

        async function convertXlsxToCsv(file) {
            if (!window.XLSX) throw new Error('Библиотека XLSX не загружена');
            const data = await file.arrayBuffer();
            const wb = window.XLSX.read(data, { type: 'array' });
            const ws = wb.Sheets[wb.SheetNames[0]];
            const csv = window.XLSX.utils.sheet_to_csv(ws);
            return new Blob([csv], { type: 'text/csv;charset=utf-8' });
        }

        async function convertCsvToDocx(file) {
            if (!window.docx || !window.XLSX) throw new Error('Библиотеки не загружены');
            const text = await file.text();
            const lines = text.split('\n').map(line => line.split(','));
            const { Document, Packer, Paragraph, TextRun, Table, TableRow, TableCell } = window.docx;
            
            const rows = lines.map(line => new TableRow({
                children: line.map(cell => new TableCell({ children: [new Paragraph(cell || '')] }))
            }));
            
            const table = new Table({ rows });
            const doc = new Document({ sections: [{ properties: {}, children: [table] }] });
            return await Packer.toBlob(doc);
        }

        async function convertXlsxToDocx(file) {
            if (!window.docx || !window.XLSX) throw new Error('Библиотеки не загружены');
            const data = await file.arrayBuffer();
            const wb = window.XLSX.read(data, { type: 'array' });
            const ws = wb.Sheets[wb.SheetNames[0]];
            const lines = window.XLSX.utils.sheet_to_json(ws, { header: 1 });
            const { Document, Packer, Paragraph, TextRun, Table, TableRow, TableCell } = window.docx;
            
            const rows = lines.map(line => new TableRow({
                children: (Array.isArray(line) ? line : Object.values(line || {})).map(cell => 
                    new TableCell({ children: [new Paragraph(String(cell || ''))] })
                )
            }));
            
            const table = new Table({ rows });
            const doc = new Document({ sections: [{ properties: {}, children: [table] }] });
            return await Packer.toBlob(doc);
        }

        // ===== КОНВЕРТЕРЫ ИЗОБРАЖЕНИЙ =====
        
        async function convertImageFormat(file, targetFormat) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        canvas.width = img.width;
                        canvas.height = img.height;
                        const ctx = canvas.getContext('2d');
                        ctx.fillStyle = 'white';
                        ctx.fillRect(0, 0, canvas.width, canvas.height);
                        ctx.drawImage(img, 0, 0);
                        
                        const quality = targetFormat === 'jpg' ? 0.85 : undefined;
                        canvas.toBlob(blob => resolve(blob), `image/${targetFormat}`, quality);
                    };
                    img.onerror = () => reject(new Error('Не удалось загрузить изображение'));
                    img.src = e.target.result;
                };
                reader.onerror = () => reject(new Error('Ошибка чтения файла'));
                reader.readAsDataURL(file);
            });
        }

        async function convertImageToPdf(file, sourceFormat) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const element = document.createElement('img');
                    element.src = e.target.result;
                    element.onload = () => {
                        const opt = {
                            margin: 0,
                            filename: file.name.replace(/\.[^.]+$/, '.pdf'),
                            image: { type: 'jpeg', quality: 0.98 },
                            html2canvas: { scale: 2 },
                            jsPDF: { orientation: element.width > element.height ? 'landscape' : 'portrait', unit: 'px', format: [element.width, element.height] }
                        };
                        if (window.html2pdf) {
                            window.html2pdf().set(opt).from(element).outputPdf('blob').then(resolve).catch(reject);
                        } else {
                            resolve(new Blob(['PDF'], { type: 'application/pdf' }));
                        }
                    };
                };
                reader.readAsDataURL(file);
            });
        }

        // ===== КОНВЕРТЕРЫ ВЕБА =====
        
        async function convertMarkdownToHtml(file) {
            const markdown = await file.text();
            const html = `<!DOCTYPE html>
<html>
<head><meta charset="UTF-8">
<style>body{font-family:Arial,sans-serif;margin:20px;line-height:1.6}h1,h2,h3{color:#333;margin-top:20px}code{background:#f4f4f4;padding:2px 6px}pre{background:#f4f4f4;padding:10px;border-radius:5px;overflow:auto}</style>
</head>
<body>
${markdown
    .replace(/^### (.*?)$/gm, '<h3>$1</h3>')
    .replace(/^## (.*?)$/gm, '<h2>$1</h2>')
    .replace(/^# (.*?)$/gm, '<h1>$1</h1>')
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/\n/g, '<br>')}
</body>
</html>`;
            return new Blob([html], { type: 'text/html;charset=utf-8' });
        }

        async function convertHtmlToMarkdown(file) {
            const html = await file.text();
            const markdown = html
                .replace(/<h1>(.*?)<\/h1>/g, '# $1')
                .replace(/<h2>(.*?)<\/h2>/g, '## $1')
                .replace(/<h3>(.*?)<\/h3>/g, '### $1')
                .replace(/<strong>(.*?)<\/strong>/g, '**$1**')
                .replace(/<em>(.*?)<\/em>/g, '*$1*')
                .replace(/<br[\s/]*>/g, '\n')
                .replace(/<[^>]+>/g, '')
                .replace(/&nbsp;/g, ' ')
                .replace(/&lt;/g, '<')
                .replace(/&gt;/g, '>')
                .replace(/&amp;/g, '&');
            return new Blob([markdown], { type: 'text/markdown;charset=utf-8' });
        }

        async function convertHtmlToPdf(file) {
            const html = await file.text();
            const element = document.createElement('div');
            element.innerHTML = html;
            const opt = {
                margin: 10,
                filename: file.name.replace('.html', '.pdf'),
                html2canvas: { scale: 2, useCORS: true },
                jsPDF: { orientation: 'portrait', unit: 'mm', format: 'a4' }
            };
            if (window.html2pdf) {
                return new Promise(resolve => {
                    window.html2pdf().set(opt).from(element).outputPdf('blob').then(resolve);
                });
            }
            return new Blob(['PDF'], { type: 'application/pdf' });
        }

        async function convertTxtToHtml(file) {
            const text = await file.text();
            const html = `<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><style>body{font-family:monospace;margin:20px;white-space:pre-wrap;word-wrap:break-word}</style></head>
<body>
${escapeHtml(text)}
</body>
</html>`;
            return new Blob([html], { type: 'text/html;charset=utf-8' });
        }

        // ===== ГЛАВНАЯ ФУНКЦИЯ КОНВЕРТАЦИИ =====
        
        async function startConversion(file) {
            if (!file) {
                showStatus('Не выбран файл.', true);
                return;
            }
            
            if (isConverting) {
                showStatus('Конвертация уже выполняется.', true);
                return;
            }

            if (!validateFileFormat(file)) {
                const conversion = conversionRules[conversionTypeSelect.value];
                showStatus(`Неверный формат: ${conversion.from.join(', ')}`, true);
                return;
            }
            
            isConverting = true;
            convertBtn.disabled = true;
            showLoadingStatus();
            
            try {
                const conversionType = conversionTypeSelect.value;
                const conversion = conversionRules[conversionType];
                let resultBlob;

                const converters = {
                    'odt-docx': () => convertOdtToDocx(file),
                    'docx-odt': () => convertDocxToOdt(file),
                    'docx-pdf': () => convertDocxToPdf(file),
                    'pdf-docx': () => convertPdfToDocx(file),
                    'txt-docx': () => convertTxtToDocx(file),
                    'docx-txt': () => convertDocxToTxt(file),
                    'csv-xlsx': () => convertCsvToXlsx(file),
                    'xlsx-csv': () => convertXlsxToCsv(file),
                    'csv-docx': () => convertCsvToDocx(file),
                    'xlsx-docx': () => convertXlsxToDocx(file),
                    'png-jpg': () => convertImageFormat(file, 'jpeg'),
                    'jpg-png': () => convertImageFormat(file, 'png'),
                    'webp-png': () => convertImageFormat(file, 'png'),
                    'webp-jpg': () => convertImageFormat(file, 'jpeg'),
                    'jpg-webp': () => convertImageFormat(file, 'webp'),
                    'png-webp': () => convertImageFormat(file, 'webp'),
                    'jpg-pdf': () => convertImageToPdf(file, 'jpg'),
                    'png-pdf': () => convertImageToPdf(file, 'png'),
                    'markdown-html': () => convertMarkdownToHtml(file),
                    'html-markdown': () => convertHtmlToMarkdown(file),
                    'html-pdf': () => convertHtmlToPdf(file),
                    'txt-html': () => convertTxtToHtml(file)
                };

                const converter = converters[conversionType];
                if (!converter) throw new Error('Неизвестный тип конвертации');
                
                resultBlob = await converter();

                const url = URL.createObjectURL(resultBlob);
                const baseName = file.name.substring(0, file.name.lastIndexOf('.')) || file.name;
                const outFileName = baseName + '.' + conversion.to;
                
                clearStatus();
                showStatus('Конвертация успешно завершена!', false, url, outFileName);
                convertBtn.disabled = false;
                isConverting = false;
            } catch (err) {
                console.error('Ошибка:', err);
                clearStatus();
                showStatus(`Ошибка: ${err.message}`, true);
                convertBtn.disabled = false;
                isConverting = false;
            }
        }

        function handleFile(file) {
            if (!file) return;
            currentFile = file;
            updateFileInfoUI(file);
            clearStatus();
            showStatus(`Файл готов к конвертации.`);
        }
        
        fileInput.addEventListener('change', (e) => {
            if (e.target.files?.length > 0) {
                handleFile(e.target.files[0]);
            } else {
                resetFileSelection();
            }
        });
        
        dropzone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropzone.classList.add('drag-over');
        });
        
        dropzone.addEventListener('dragleave', () => {
            dropzone.classList.remove('drag-over');
        });
        
        dropzone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropzone.classList.remove('drag-over');
            const files = e.dataTransfer.files;
            if (files.length > 0) handleFile(files[0]);
        });
        
        dropzone.addEventListener('click', (e) => {
            if (e.target === dropzone || e.target.closest('.dropzone')) {
                if (!e.target.closest('.file-input-label')) {
                    fileInput.click();
                }
            }
        });
        
        convertBtn.addEventListener('click', () => {
            currentFile ? startConversion(currentFile) : showStatus('Нет файла.', true);
        });
        
        conversionTypeSelect.addEventListener('change', () => {
            if (currentFile && !validateFileFormat(currentFile)) {
                showStatus('Файл не совместим!', true);
                resetFileSelection();
            }
        });
        
        resetFileSelection();
        showStatus('Выберите формат и загрузите файл.');
    })();
</script>
</body>
</html>
